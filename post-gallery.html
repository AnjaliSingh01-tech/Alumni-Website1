<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Gallery Item</title>
    <link rel="stylesheet" href="CSS/post-gallery.css">
</head>
<body>

    <div class="gallery-container">
        <div class="gallery-card">

            <h2>Add Gallery Image</h2>
            <p class="subtitle">
                Share campus memories, alumni meetups, workshops, and achievements.
            </p>

            <form id="galleryForm">

                <div class="input-box">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="e.g. Alumni Meetup 2026" required>
                </div>

                <div class="input-box">
                    <label>Category</label>
                    <input type="text" id="category" placeholder="e.g. Campus Life / Events / Workshops" required>
                </div>

                <div class="input-box">
                    <label>Image URL</label>
                   <input type="file" id="imageFile" accept="image/*" required>
                </div>

                <div class="input-box">
                    <label>Description</label>
                    <textarea id="description" placeholder="Describe this memory..."></textarea>
                </div>

                <button type="submit">Post to Gallery</button>

                <div class="back-link">
                    <a href="dashboard.html">← Back to Dashboard</a>
                </div>

            </form>

        </div>
    </div>

    <script src="js/post-gallery.js"></script>
</body>
</html>
