<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Event</title>
    <link rel="stylesheet" href="CSS/post-event.css">
</head>
<body>

    <div class="event-container">
        <div class="event-card">

            <h2>Post an Alumni Event</h2>
            <p class="subtitle">
                Share alumni meetups, webinars, workshops, and networking events.
            </p>

            <form id="eventForm">

                <div class="input-box">
                    <label>Event Title</label>
                    <input type="text" id="title" placeholder="e.g. Alumni Meetup 2026" required>
                </div>

                <div class="input-box">
                    <label>Organizer</label>
                    <input type="text" id="organizer" placeholder="e.g. Alumni Association" required>
                </div>

                <div class="input-box">
                    <label>Event Date</label>
                    <input type="date" id="eventDate" required>
                </div>

                <div class="input-box">
                    <label>Event Time</label>
                    <input type="time" id="eventTime" required>
                </div>

                <div class="input-box">
                    <label>Location</label>
                    <input type="text" id="location" placeholder="e.g. Delhi / Online" required>
                </div>

                <div class="input-box">
                    <label>Description</label>
                    <textarea id="description" placeholder="Describe the event..." required></textarea>
                </div>

                <div class="input-box">
                    <label>Registration Link</label>
                    <input type="text" id="registrationLink" placeholder="https://...">
                </div>

                <button type="submit">Post Event</button>

                <div class="back-link">
                    <a href="dashboard.html">← Back to Dashboard</a>
                </div>

            </form>

        </div>
    </div>

    <script src="js/post-event.js"></script>
</body>
</html>
