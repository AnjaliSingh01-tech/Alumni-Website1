<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Portal - Login</title>
    <link rel="stylesheet" href="CSS/login.css">
</head>
<body>
    <div class="login-container">

        <div class="login-icon">A</div>

        <h2>Alumni Login</h2>
        <p class="subtitle">Login to continue to your alumni account</p>

        <form id="loginForm">

            <div class="input-box">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
                <p class="error" id="emailError">Please enter a valid email</p>
            </div>

            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
                <p class="error" id="passError">Password must be at least 6 characters</p>
            </div>

            <button type="submit">Login</button>

            <div class="signup-link">
                Don’t have an account?
                <a href="signup.html">Sign Up</a>
            </div>

        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
