<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumni Portal - Sign Up</title>
    <link rel="stylesheet" href="CSS/signup.css">
</head>
<body>

    <div class="container">
        <form id="signupForm">
            <h2>Alumni Sign Up</h2>

            <div class="input-box">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your name">
                <p class="error" id="nameError">Name is required</p>
            </div>

            <div class="input-box">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">
                <p class="error" id="emailError">Valid email is required</p>
            </div>

            <div class="input-box">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create password">
                <p class="error" id="passError">Password must be 6+ characters</p>
            </div>

            <div class="input-box">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password">
                <p class="error" id="confirmError">Passwords do not match</p>
            </div>

            <button type="submit">Create Account</button>

            <div class="login-link">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </form>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
