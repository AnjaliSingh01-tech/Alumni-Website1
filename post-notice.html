<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Notice</title>
    <link rel="stylesheet" href="CSS/post-notice.css">
</head>
<body>

    <div class="notice-container">
        <div class="notice-card">

            <h2>Post a Notice</h2>
            <p class="subtitle">
                Share important announcements, placements, exams, scholarships, and updates.
            </p>

            <form id="noticeForm">

                <div class="input-box">
                    <label>Notice Title</label>
                    <input type="text" id="title" placeholder="e.g. Google Placement Drive 2026" required>
                </div>

                <div class="input-box">
                    <label>Category</label>
                    <input type="text" id="category" placeholder="Placement / Exam / Scholarship / Event / General" required>
                </div>

                <div class="input-box">
                    <label>Notice Message</label>
                    <textarea id="message" placeholder="Write full notice details..." required></textarea>
                </div>

                <button type="submit">Post Notice</button>

                <div class="back-link">
                    <a href="dashboard.html">← Back to Dashboard</a>
                </div>

            </form>

        </div>
    </div>

    <script src="js/post-notice.js"></script>
</body>
</html>
